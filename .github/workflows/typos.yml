---
# yamllint disable rule:line-length
name: check_typos

on: # yamllint disable-line rule:truthy
    push:
    pull_request:
        branches:
            - "**"

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - name: typos-action
              uses: crate-ci/typos@v1
