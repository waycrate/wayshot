[graph]
all-features = true

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "NCSA",
    "Unicode-3.0",
    "MPL-2.0",
]
confidence-threshold = 0.8
exceptions = [
    # wayshot depends on GPL-3.0 so we need to make an exception
    { allow = ["GPL-3.0-only", "GPL-3.0-or-later"], crate = "wayshot" },
    { allow = ["GPL-3.0-only", "GPL-3.0-or-later"], crate = "jpegxl-rs" },
    { allow = ["GPL-3.0-only", "GPL-3.0-or-later"], crate = "jpegxl-sys" },
    # waymirror-egl depends on CECILL-2.1 so we need to make an exception
    { allow = ["CECILL-2.1"], crate = "gl_loader" },
]
private = { ignore = true }

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]

[bans]
multiple-versions = "warn"

[sources]
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
